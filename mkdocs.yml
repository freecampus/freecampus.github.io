site_name: FreeCampus
site_description: Free, community-built learning materials for everyone.
site_url: https://freecampus.org/
site_author: FreeCampus Community

docs_dir: docs
site_dir: build

theme:
  name: null
  custom_dir: theme
  language: en

nav:
  - Home: index.md
  - Subjects: subjects/index.md
  - About: about.md
  - Contribute: contribute.md

extra_css:
  - assets/stylesheets/main.css

markdown_extensions:
  - meta
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.superfences

extra:
  social:
    github: https://github.com/freecampus

copyright: "Knowledge, shared freely."
